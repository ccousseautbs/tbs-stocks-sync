name: Stocks Sync TBS

on:
  # Trigger quotidien à 3h du matin (heure Paris = 1h UTC)
  schedule:
    - cron: '0 1 * * *'
  # Trigger manuel depuis l'interface GitHub
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stocks sync
        env:
          GCP_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: python stocks_sync.py
